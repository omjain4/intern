<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn - Notifications</title>
    <link rel="stylesheet" href="../common.css">
    <link rel="stylesheet" href="notifications.css">
</head>
<body>

    <div class="navbar">
        <h1 class="logo">LinkedIn</h1>
        <input type="text" class="search-bar" placeholder="Search...">
        <div class="nav-links">
            <a href="../home/home.html">Home</a>
            <a href="../network/network.html">Network</a>
            <a href="../jobs/jobs.html">Jobs</a>
            <a href="../messages/messages.html">Messages</a>
            <a href="notifications.html">Notifications</a>
            <a href="../profile/profile.html">Profile</a>
        </div>
    </div>

    <div class="notifications-container">
        <h2 class="page-title">Notifications</h2>

        <div class="notification-item unread">
            <div class="notification-content">
                <p class="notification-type">Connection</p>
                <p class="notification-text">Amit Kumar accepted your connection request.</p>
            </div>
            <span class="notification-time">2 min ago</span>
        </div>

        <div class="notification-item unread">
            <div class="notification-content">
                <p class="notification-type">Comment</p>
                <p class="notification-text">Sneha Gupta commented on your post: "Great work!"</p>
            </div>
            <span class="notification-time">1 hour ago</span>
        </div>

        <div class="notification-item">
            <div class="notification-content">
                <p class="notification-type">Job</p>
                <p class="notification-text">Your application for Junior Web Developer was viewed.</p>
            </div>
            <span class="notification-time">3 hours ago</span>
        </div>

    </div>

</body>
</html>
