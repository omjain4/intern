<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn  - Register</title>
    <link rel="stylesheet" href="../common.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>


    <div class="auth-container">
        <div class="auth-box">
            <h2>Join LinkedIn</h2>
            <form id="registerForm">
                <input id="registerName" type="text" placeholder="Full Name" required>
                <input id="registerRole" type="text" placeholder="Role (e.g. Student)" required>
                <input id="registerEmail" type="email" placeholder="Email" required>
                <input id="registerPassword" type="password" placeholder="Password" required>
                <button type="submit">Register</button>
            </form>
            <p id="authMessage" class="auth-message" aria-live="polite"></p>
            <p>Already on LinkedIn? <a href="login.html">Sign in</a></p>
        </div>
    </div>

    <script src="../common.js"></script>
    <script src="auth.js"></script>

</body>
</html>
