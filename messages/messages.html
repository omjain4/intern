<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn - Messages</title>
    <link rel="stylesheet" href="../common.css">
    <link rel="stylesheet" href="messages.css">
</head>
<body>

    <div class="navbar">
        <h1 class="logo">LinkedIn</h1>
        <input type="text" class="search-bar" placeholder="Search...">
        <div class="nav-links">
            <a href="../home/home.html">Home</a>
            <a href="../network/network.html">Network</a>
            <a href="../jobs/jobs.html">Jobs</a>
            <a href="messages.html">Messages</a>
            <a href="../notifications/notifications.html">Notifications</a>
            <a href="../profile/profile.html">Profile</a>
        </div>
    </div>

    <div class="messages-container">

        <div class="conversations-list">
            <h3>Messages</h3>
            <div class="conversation-item">
                <p class="name">Priya Patel</p>
                <p class="preview">Hey, how are you?</p>
            </div>
            <div class="conversation-item">
                <p class="name">Amit Kumar</p>
                <p class="preview">Please send your resume</p>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header">Priya Patel</div>
            <div class="chat-messages">
                <div class="message received">
                    <p>Hey Rahul! How are you doing?</p>
                    <p class="time">10:30 AM</p>
                </div>
                <div class="message sent">
                    <p>Hi Priya! I am good. Working on a new project.</p>
                    <p class="time">10:32 AM</p>
                </div>
            </div>
            <div class="chat-input">
                <input type="text" placeholder="Type a message...">
                <button>Send</button>
            </div>
        </div>

    </div>

</body>
</html>
